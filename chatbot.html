<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Load custom data first -->
    <script src="customData.js"></script>
    <!-- Markdown renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>

    <title>Dominal AI - Chat Interface</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ── LIGHT MODE (default) ── */
        :root {
            --bg-primary:        #ffffff;
            --bg-secondary:      #f4f4f5;
            --bg-sidebar:        #f9f9f9;
            --bg-hover:          #ebebeb;
            --bg-chat-user:      #f4f4f5;
            --bg-chat-assistant: #ffffff;
            --text-primary:      #0f172a;
            --text-secondary:    #64748b;
            --text-sidebar:      #1e293b;
            --text-assistant:    #0f172a;
            --border-color:      rgba(0,0,0,0.08);
            --accent-color:      #10a37f;
            --accent-hover:      #0d8f6f;
            --danger-color:      #ef4444;
            --danger-hover:      #dc2626;
            --shadow:            0 1px 4px rgba(0,0,0,0.07);
        }

        /* ── DARK MODE override ── */
        body.dark {
            --bg-primary:        #0f0f0f;
            --bg-secondary:      #1a1a1a;
            --bg-sidebar:        #0f0f0f;
            --bg-hover:          #252525;
            --bg-chat-user:      #1a1a1a;
            --bg-chat-assistant: #0f0f0f;
            --text-primary:      #f1f5f9;
            --text-secondary:    #94a3b8;
            --text-sidebar:      #ececf1;
            --text-assistant:    #f1f5f9;
            --border-color:      rgba(255,255,255,0.08);
            --shadow:            0 1px 4px rgba(0,0,0,0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            transition: transform 0.3s ease, background 0.3s;
        }

        /* Desktop: Always visible, never moves */
        @media (min-width: 769px) {
            .sidebar {
                transform: translateX(0) !important;
            }
        }

        /* Mobile: Hidden by default, slides in when open */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                max-width: 320px;
            }
        }

        .sidebar-header {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px 16px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-sidebar);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: var(--bg-hover);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            max-height: calc(100vh - 280px);
        }

        .chat-history-item {
            padding: 12px;
            margin-bottom: 4px;
            border-radius: 8px;
            color: var(--text-sidebar);
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .chat-history-item:hover {
            background: var(--bg-hover);
        }

        .chat-history-item.active {
            background: var(--bg-hover);
        }

        .chat-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .delete-chat-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            font-size: 16px;
            display: none;
            transition: color 0.2s;
        }

        .chat-history-item:hover .delete-chat-btn {
            display: block;
        }

        .delete-chat-btn:hover {
            color: var(--danger-color);
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            color: var(--text-sidebar);
            font-size: 12px;
            flex-shrink: 0;
        }

        .model-info {
            padding: 6px 12px;
            background: var(--bg-hover);
            border-radius: 6px;
            margin-bottom: 6px;
        }

        .clear-all-btn {
            width: 100%;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 6px;
            transition: all 0.2s;
        }

        /* Mobile: Compact sidebar footer */
        @media (max-width: 768px) {
            .sidebar-footer {
                padding: 8px 12px;
            }

            .model-info {
                padding: 4px 8px;
                margin-bottom: 4px;
                font-size: 11px;
            }

            .model-name {
                font-size: 12px;
            }

            .model-version {
                font-size: 10px;
            }

            .creator-info {
                font-size: 10px;
            }

            .clear-all-btn {
                padding: 6px 12px;
                font-size: 11px;
                margin-top: 4px;
            }
        }

        .model-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--accent-color);
        }

        .model-version {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .creator-info {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .clear-all-btn:hover {
            background: var(--danger-color);
            color: white;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            z-index: 1;
            transition: margin-left 0.3s ease, background 0.3s;
            background: var(--bg-primary);
        }

        /* Desktop: Add margin for sidebar */
        @media (min-width: 769px) {
            .main-content {
                margin-left: 280px;
            }
        }

        /* Mobile: No margin */
        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
            }
        }

        .top-bar {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-primary);
            z-index: 2;
            transition: background 0.3s;
        }

        .menu-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .menu-btn:hover {
            background: var(--border-color);
        }

        .top-bar-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            transition: background 0.3s;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: var(--bg-primary);
        }

        .logo-container {
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @media (max-width: 768px) {
            .logo-container {
                width: 180px;
                height: 180px;
            }
        }

        .empty-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .empty-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
        }

        .chat-messages {
            flex: 1;
            background: var(--bg-primary);
        }

        .message-wrapper {
            border-bottom: 1px solid var(--border-color);
            padding: 24px 0;
            transition: background 0.3s;
        }

        .message-wrapper.user {
            background: var(--bg-chat-user);
        }

        .message-wrapper.assistant {
            background: var(--bg-chat-assistant);
        }

        .message {
            max-width: 768px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            gap: 24px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .message-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            background: transparent;
        }

        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 5px;
        }

        .user .message-avatar {
            background: #667eea;
            color: white;
            font-weight: 600;
            font-size: 20px;
        }

        .user .message-avatar img {
            padding: 0;
            object-fit: cover;
        }

        .assistant .message-avatar {
            background: transparent;
            padding: 0;
        }

        @media (max-width: 768px) {
            .message-avatar {
                width: 50px;
                height: 50px;
            }

            .user .message-avatar {
                font-size: 18px;
            }
        }

        .message-content {
            flex: 1;
            line-height: 1.7;
            font-size: 16px;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            hyphens: auto;
            max-width: 100%;
            padding-top: 5px;
            color: var(--text-primary);
        }

        /* White text for assistant messages on black background */
        .assistant .message-content {
            color: var(--text-assistant);
        }

        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.6;
            }

            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        .input-container {
            padding: 24px;
            background: var(--bg-primary);
            border-top: 1px solid var(--border-color);
            transition: background 0.3s;
        }

        .input-wrapper {
            max-width: 768px;
            margin: 0 auto;
            position: relative;
        }

        .chat-input {
            width: 100%;
            padding: 16px 52px 16px 52px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            background: var(--bg-secondary);
            color: var(--text-primary);
            resize: none;
            min-height: 54px;
            max-height: 200px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .chat-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(16, 163, 127, 0.1);
        }

        .send-button {
            position: absolute;
            right: 12px;
            bottom: 12px;
            width: 32px;
            height: 32px;
            background: var(--accent-color);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            font-size: 18px;
        }

        .send-button:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .send-button:disabled {
            background: var(--border-color);
            cursor: not-allowed;
        }

        .input-hint {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 12px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        /* Show overlay ONLY on mobile when sidebar is open */
        @media (max-width: 768px) {
            .overlay.active {
                display: block;
            }
        }

        .chat-history::-webkit-scrollbar,
        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-history::-webkit-scrollbar-track,
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-history::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .chat-history::-webkit-scrollbar-thumb:hover,
        .chat-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 768px) {
            .message {
                padding: 0 16px;
            }

            .input-container {
                padding: 16px;
            }
        }

        /* Hide menu button on desktop (PC) */
        @media (min-width: 769px) {
            .menu-btn {
                display: none !important;
            }

            .sidebar {
                transform: translateX(0) !important;
            }

            .sidebar.collapsed {
                transform: translateX(0) !important;
            }

            .main-content {
                margin-left: 280px !important;
            }
        }

        /* Show menu button only on mobile */
        @media (max-width: 768px) {
            .menu-btn {
                display: flex !important;
            }
        }

        .voice-button {
            position: absolute;
            left: 12px;
            bottom: 12px;
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            padding: 0;
        }

        .voice-button svg {
            width: 20px;
            height: 20px;
        }

        .voice-button:hover {
            background: var(--bg-secondary);
            color: var(--accent-color);
        }

        .voice-button.recording {
            color: #ef4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* Message action buttons (copy, speak) */
        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            opacity: 1;
            transition: opacity 0.2s;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .action-btn:hover {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .action-btn.speaking {
            background: var(--accent-color);
            color: white;
        }

        .ppt-maker-btn {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            margin-top: 12px;
            font-weight: 600;
            text-decoration: none;
            justify-content: center;
        }

        .ppt-maker-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .ppt-maker-btn .icon {
            font-size: 18px;
        }

        .chat-close-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: #ef4444;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            margin-left: 30px;
            justify-content: center;
            position: relative;
        }

        @media (max-width: 768px) {
            .chat-close-btn {
                width: 34px;
                height: 34px;
                font-size: 1.2rem;
                margin-left: 30px;
                position: relative;
            }
        }

        /* ── MARKDOWN PROSE STYLES ── */
        .prose { line-height: 1.75; color: var(--text-primary); }
        .prose p { margin: 0 0 12px 0; }
        .prose p:last-child { margin-bottom: 0; }
        .prose h1,.prose h2,.prose h3,.prose h4 {
            font-weight: 700; color: #ffffff; margin: 18px 0 8px;
            line-height: 1.3;
        }
        .prose h1 { font-size: 1.4em; }
        .prose h2 { font-size: 1.2em; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; }
        .prose h3 { font-size: 1.05em; }
        .prose h4 { font-size: 0.95em; color: rgba(255,255,255,0.8); }
        .prose ul, .prose ol { padding-left: 22px; margin: 8px 0 12px; }
        .prose li { margin: 5px 0; }
        .prose ul li { list-style-type: disc; }
        .prose ol li { list-style-type: decimal; }
        .prose li > ul, .prose li > ol { margin: 4px 0; }
        .prose strong { color: #ffffff; font-weight: 700; }
        .prose em { color: rgba(255,255,255,0.85); font-style: italic; }
        .prose code {
            font-family: 'Consolas','Fira Code','Courier New', monospace;
            font-size: 0.88em;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 5px;
            padding: 2px 6px;
            color: #a8d8a8;
        }
        .prose pre {
            background: #0d1117;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 16px 18px;
            overflow-x: auto;
            margin: 12px 0;
        }
        .prose pre code {
            background: transparent;
            border: none;
            padding: 0;
            font-size: 0.9em;
            color: #e2e8f0;
        }
        .prose blockquote {
            border-left: 3px solid var(--accent-color);
            padding: 8px 16px;
            margin: 12px 0;
            background: rgba(16,163,127,0.06);
            border-radius: 0 8px 8px 0;
            color: rgba(255,255,255,0.75);
            font-style: italic;
        }
        .prose a {
            color: var(--accent-color);
            text-decoration: none;
            border-bottom: 1px solid rgba(16,163,127,0.4);
            word-break: break-all;
        }
        .prose a:hover { border-bottom-color: var(--accent-color); }
        .prose table {
            width: 100%; border-collapse: collapse; margin: 12px 0;
            font-size: 0.9em;
        }
        .prose th {
            background: rgba(255,255,255,0.06);
            color: #ffffff;
            font-weight: 600;
            padding: 10px 14px;
            border: 1px solid rgba(255,255,255,0.12);
            text-align: left;
        }
        .prose td {
            padding: 9px 14px;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .prose tr:nth-child(even) td { background: var(--bg-secondary); }
        .prose hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 16px 0;
        }

        /* ── DARK MODE TOGGLE BUTTON ── */
        .theme-toggle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.25s, border-color 0.25s, transform 0.3s;
            flex-shrink: 0;
        }
        .theme-toggle:hover { background: var(--bg-hover); transform: scale(1.08); }
        .theme-toggle svg { transition: transform 0.4s ease, opacity 0.3s ease; }
        .theme-toggle .icon-moon { display: none; }
        body.dark .theme-toggle .icon-sun  { display: none; }
        body.dark .theme-toggle .icon-moon { display: block; }
    </style>
</head>

<body>

    <div class="app-container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn">
                    <span>+</span>
                    <span>New Chat</span>
                </button>
            </div>
            <div class="chat-history" id="chatHistory"></div>
            <div class="sidebar-footer">
                <div class="model-info">
                    <div class="model-name">Dominal AI v2.5</div>
                </div>
                <button class="clear-all-btn" id="clearAllBtn">Clear All Conversations</button>
                <div class="creator-info">Built by Yahya © 2025</div>
            </div>
        </div>

        <div class="overlay" id="overlay"></div>

        <div class="main-content">
            <div class="top-bar">
                <button class="menu-btn" id="menuBtn">☰</button>
                <div class="top-bar-title">Dominal AI Assistant</div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <button class="theme-toggle" id="themeToggle" title="Toggle dark / light mode">
                        <!-- Sun icon (shown in light mode) -->
                        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"/>
                            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </svg>
                        <!-- Moon icon (shown in dark mode) -->
                        <svg class="icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </button>
                    <button class="chat-close-btn" id="chatCloseBtn">✕</button>
                </div>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="empty-state" id="emptyState">
                    <div class="logo-container">
                        <img src="logo.png" alt="Dominal AI Logo">
                    </div>
                    <div class="empty-title">Dominal v2.5</div>
                    <div class="empty-subtitle">How can I help you today?</div>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <button class="voice-button" id="voiceButton" title="Voice input">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>
                    <textarea class="chat-input" id="chatInput" placeholder="Send a message or use voice..."
                        rows="1"></textarea>
                    <button class="send-button" id="sendButton">➤</button>
                </div>
                <div class="input-hint">Dominal AI can make mistakes. Consider checking important information.</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // DARK MODE TOGGLE
        // ============================================================
        (function () {
            const saved = localStorage.getItem('dominalTheme');
            if (saved === 'dark') document.body.classList.add('dark');

            document.addEventListener('DOMContentLoaded', () => {
                const btn = document.getElementById('themeToggle');
                if (!btn) return;
                btn.addEventListener('click', () => {
                    document.body.classList.toggle('dark');
                    localStorage.setItem('dominalTheme',
                        document.body.classList.contains('dark') ? 'dark' : 'light');
                });
            });
        })();

        // ============================================================
        // MARKDOWN PARSER (uses marked.js)
        // ============================================================

        function parseMarkdown(text) {
            if (typeof marked === 'undefined') {
                // Fallback: basic line-break handling if marked hasn't loaded
                return text
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                    .replace(/\n/g, '<br>');
            }
            marked.setOptions({
                breaks: true,       // newlines → <br>
                gfm: true,          // GitHub Flavored Markdown
                headerIds: false,
                mangle: false
            });
            return marked.parse(text);
        }

        // ============================================================
        // RAG retrieval engine loaded from customData.js (retrieveContext)
        // ============================================================

        // ============================================================
        // CORE CHAT ENGINE
        // ============================================================

        const chatMessages = document.getElementById('chatMessages');
        const chatContainer = document.getElementById('chatContainer');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');
        const emptyState = document.getElementById('emptyState');
        const newChatBtn = document.getElementById('newChatBtn');
        const chatHistory = document.getElementById('chatHistory');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const sidebar = document.getElementById('sidebar');
        const menuBtn = document.getElementById('menuBtn');
        const overlay = document.getElementById('overlay');

        let conversations = JSON.parse(localStorage.getItem('dominalConversations')) || [];
        let currentConversationId = null;

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function saveConversations() {
            localStorage.setItem('dominalConversations', JSON.stringify(conversations));
        }

        function getCurrentConversation() {
            return conversations.find(c => c.id === currentConversationId);
        }

        function createNewConversation() {
            const newConv = {
                id: generateId(),
                title: 'New Conversation',
                messages: [],
                createdAt: Date.now()
            };
            conversations.unshift(newConv);
            currentConversationId = newConv.id;
            saveConversations();
            renderChatHistory();
            clearChatDisplay();
        }

        function switchConversation(id) {
            currentConversationId = id;
            renderChatHistory();
            renderCurrentChat();
        }

        function deleteConversation(id) {
            conversations = conversations.filter(c => c.id !== id);
            if (currentConversationId === id) {
                currentConversationId = conversations.length > 0 ? conversations[0].id : null;
                renderCurrentChat();
            }
            saveConversations();
            renderChatHistory();
        }

        function clearAllConversations() {
            if (confirm('Are you sure you want to delete all conversations? This cannot be undone.')) {
                conversations = [];
                currentConversationId = null;
                saveConversations();
                renderChatHistory();
                clearChatDisplay();
            }
        }

        function updateConversationTitle(conv) {
            if (conv.messages.length > 0 && conv.title === 'New Conversation') {
                const firstMessage = conv.messages.find(m => m.role === 'user');
                if (firstMessage) {
                    conv.title = firstMessage.content.substring(0, 30) + (firstMessage.content.length > 30 ? '...' : '');
                    saveConversations();
                    renderChatHistory();
                }
            }
        }

        function renderChatHistory() {
            chatHistory.innerHTML = '';
            conversations.forEach(conv => {
                const item = document.createElement('div');
                item.className = 'chat-history-item' + (conv.id === currentConversationId ? ' active' : '');

                const title = document.createElement('span');
                title.className = 'chat-title';
                title.textContent = conv.title;

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-chat-btn';
                deleteBtn.innerHTML = '×';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteConversation(conv.id);
                };

                item.appendChild(title);
                item.appendChild(deleteBtn);
                item.onclick = () => switchConversation(conv.id);

                chatHistory.appendChild(item);
            });
        }

        function clearChatDisplay() {
            chatMessages.innerHTML = '';
            emptyState.style.display = 'flex';
            chatMessages.style.display = 'none';
        }

        function renderCurrentChat() {
            const conv = getCurrentConversation();
            if (!conv || conv.messages.length === 0) {
                clearChatDisplay();
                return;
            }

            emptyState.style.display = 'none';
            chatMessages.style.display = 'block';
            chatMessages.innerHTML = '';

            conv.messages.forEach(msg => {
                addMessageToDisplay(msg.role, msg.content, false);
            });

            scrollToBottom();
        }

        function addMessageToDisplay(role, content, animate = true) {
            if (emptyState.style.display !== 'none') {
                emptyState.style.display = 'none';
                chatMessages.style.display = 'block';
            }

            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${role}`;
            if (animate) {
                wrapper.style.opacity = '0';
                wrapper.style.transform = 'translateY(10px)';
            }

            const message = document.createElement('div');
            message.className = 'message';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';

            if (role === 'assistant') {
                const logoImg = document.createElement('img');
                logoImg.src = 'logo.png';
                logoImg.alt = 'Dominal AI';
                avatar.appendChild(logoImg);
            } else {
                avatar.textContent = 'Y';
            }

            const messageContent = document.createElement('div');
            messageContent.className = role === 'assistant' ? 'message-content prose' : 'message-content';
            if (role === 'assistant') {
                messageContent.innerHTML = parseMarkdown(content);
            } else {
                // User messages: plain text, but preserve newlines
                messageContent.innerText = content;
            }

            message.appendChild(avatar);

            const contentWrapper = document.createElement('div');
            contentWrapper.style.flex = '1';
            contentWrapper.appendChild(messageContent);

            if (role === 'assistant') {
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'message-actions';

                const copyBtn = document.createElement('button');
                copyBtn.className = 'action-btn';
                copyBtn.innerHTML = '📋 Copy';
                copyBtn.onclick = () => {
                    copyToClipboard(content);
                    copyBtn.innerHTML = '✓ Copied';
                    setTimeout(() => {
                        copyBtn.innerHTML = '📋 Copy';
                    }, 2000);
                };

                const speakBtn = document.createElement('button');
                speakBtn.className = 'action-btn';
                speakBtn.innerHTML = '🔊 Speak';
                speakBtn.onclick = () => {
                    const isSpeaking = speakText(content, speakBtn);
                    if (isSpeaking) {
                        speakBtn.classList.add('speaking');
                        speakBtn.innerHTML = '⏸ Stop';
                    } else {
                        speakBtn.classList.remove('speaking');
                        speakBtn.innerHTML = '🔊 Speak';
                    }
                };

                actionsDiv.appendChild(copyBtn);
                actionsDiv.appendChild(speakBtn);
                contentWrapper.appendChild(actionsDiv);
            }

            message.appendChild(contentWrapper);
            wrapper.appendChild(message);
            chatMessages.appendChild(wrapper);

            if (animate) {
                setTimeout(() => {
                    wrapper.style.transition = 'all 0.3s ease';
                    wrapper.style.opacity = '1';
                    wrapper.style.transform = 'translateY(0)';
                }, 10);
            }

            scrollToBottom();
            return messageContent;
        }

        function addTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper assistant';
            wrapper.id = 'typingIndicator';

            const message = document.createElement('div');
            message.className = 'message';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            const logoImg = document.createElement('img');
            logoImg.src = 'logo.png';
            logoImg.alt = 'Dominal AI';
            avatar.appendChild(logoImg);

            const content = document.createElement('div');
            content.className = 'message-content';

            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

            content.appendChild(typing);
            message.appendChild(avatar);
            message.appendChild(content);
            wrapper.appendChild(message);
            chatMessages.appendChild(wrapper);

            scrollToBottom();
            return wrapper;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Voice recognition setup
        let recognition = null;
        let isRecording = false;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                chatInput.value = transcript;
                chatInput.style.height = 'auto';
                chatInput.style.height = Math.min(chatInput.scrollHeight, 200) + 'px';
            };

            recognition.onend = () => {
                isRecording = false;
                voiceButton.classList.remove('recording');
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                isRecording = false;
                voiceButton.classList.remove('recording');
            };
        }

        // Text-to-speech setup
        let currentSpeech = null;

        function speakText(text, button) {
            if (currentSpeech) {
                window.speechSynthesis.cancel();
                currentSpeech = null;
                if (button) {
                    button.classList.remove('speaking');
                    button.innerHTML = '🔊 Speak';
                }
                return false;
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            utterance.lang = 'en-US';

            utterance.onend = () => {
                currentSpeech = null;
                if (button) {
                    button.classList.remove('speaking');
                    button.innerHTML = '🔊 Speak';
                }
            };

            currentSpeech = utterance;
            window.speechSynthesis.speak(utterance);
            return true;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                console.log('Copied to clipboard');
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        // ============================================================
        // SMART RAG SENDMESSAGE — uses retrieveContext() from customData.js
        // ============================================================

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            if (!currentConversationId) {
                createNewConversation();
            }

            const conv = getCurrentConversation();

            chatInput.value = '';
            chatInput.style.height = 'auto';
            sendButton.disabled = true;

            conv.messages.push({ role: 'user', content: message });
            addMessageToDisplay('user', message);
            updateConversationTitle(conv);
            saveConversations();

            // ── RAG: retrieve top matching knowledge chunks ──
            const relevantChunks = retrieveContext(message, 3);
            const contextBlock = relevantChunks.length > 0
                ? relevantChunks.map(c => c.content).join('\n\n')
                : '';

            const systemPrompt = `You are Dominal AI — a smart, friendly personal AI assistant representing Yahya Mundewadi and his company Dominal Tech.

**Your personality:**
- Speak in a confident, knowledgeable voice ("Yahya has...", "He built...")
- Be concise and accurate. Never make up facts.
- If a question is outside the knowledge base, say: "I don't have specific information on that, but feel free to reach out to Yahya at yahyabuilds@gmail.com or visit yahya.in."
- Never roleplay as Yahya himself — you are his AI assistant.

**Formatting rules — ALWAYS follow these:**
- Use **markdown** in every response.
- Use **bold** for key names, terms, and headlines.
- Use bullet points (- item) or numbered lists for any list of items, features, steps, or projects.
- Use ## or ### headings to separate distinct sections when answering multi-part questions.
- Use \`inline code\` for technical terms, URLs, and package names.
- Add a blank line between paragraphs and list blocks for breathing room.
- Use > blockquote for quotes, tips, or highlighted notes.
- Never dump everything into one long paragraph — always break it up.
- Keep responses concise but complete. Avoid unnecessary filler.

${contextBlock
    ? `## Retrieved Knowledge\n\n${contextBlock}\n\nAnswer using the above context. Stick to it — do not invent details outside it.`
    : `No specific knowledge matched. Use this fallback:\n\nYahya Mundewadi is a full-stack developer, Android engineer, Python developer, and AI engineer from Solapur, India. CEO of **Dominal Tech** (dominal.in). Contact: \`yahyabuilds@gmail.com\` | Portfolio: \`yahya.in\``
}`;

            // Build messages array for API (system + last 6 turns for context window)
            const historyTurns = conv.messages.slice(-6);
            const apiMessages = [
                { role: 'system', content: systemPrompt },
                ...historyTurns
            ];

            const typingIndicator = addTypingIndicator();

            try {
                const response = await fetch('/.netlify/functions/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: apiMessages })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                removeTypingIndicator();

                const assistantMessage = data.choices?.[0]?.message?.content || 'Sorry, I could not generate a response.';

                conv.messages.push({ role: 'assistant', content: assistantMessage });
                addMessageToDisplay('assistant', assistantMessage);
                saveConversations();

            } catch (error) {
                removeTypingIndicator();
                addMessageToDisplay('assistant', 'Connection error. Please check your network and try again.');
                console.error('Dominal AI error:', error);
            }

            sendButton.disabled = false;
            chatInput.focus();
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================

        chatInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendButton.addEventListener('click', sendMessage);

        newChatBtn.addEventListener('click', () => {
            createNewConversation();
            closeSidebar();
        });

        clearAllBtn.addEventListener('click', clearAllConversations);

        menuBtn.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
            }
        });

        overlay.addEventListener('click', closeSidebar);

        function closeSidebar() {
            if (window.innerWidth <= 768) {
                sidebar.classList.remove('open');
                overlay.classList.remove('active');
            }
        }

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                sidebar.classList.remove('open');
                overlay.classList.remove('active');
            }
        });

        const voiceButton = document.getElementById('voiceButton');
        if (voiceButton && recognition) {
            voiceButton.addEventListener('click', () => {
                if (isRecording) {
                    recognition.stop();
                    isRecording = false;
                    voiceButton.classList.remove('recording');
                } else {
                    recognition.start();
                    isRecording = true;
                    voiceButton.classList.add('recording');
                }
            });
        } else if (voiceButton && !recognition) {
            voiceButton.style.display = 'none';
        }

        // ============================================================
        // INITIALIZATION
        // ============================================================

        if (conversations.length === 0) {
            createNewConversation();
        } else {
            currentConversationId = conversations[0].id;
            renderChatHistory();
            renderCurrentChat();
        }

        chatInput.focus();

        window.addEventListener('load', () => {
            history.pushState({ fromChat: true }, '', window.location.href);
        });

        window.addEventListener('popstate', (event) => {
            window.location.href = 'index.html';
        });

        function goBackToMain() {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage('closeChat', '*');
            } else {
                window.location.href = 'index.html';
            }
        }

        document.getElementById('chatCloseBtn')?.addEventListener('click', goBackToMain);

        window.addEventListener('load', () => {
            history.pushState({ fromChat: true }, '', window.location.href);
        });

        window.addEventListener('popstate', () => {
            window.location.href = 'index.html';
        });
    </script>

</body>

</html>
